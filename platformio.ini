[env:azoth_esp32_s3_n16r8]
platform = espressif32
board = azoth_esp32_s3_n16r8
framework = arduino
monitor_speed = 115200
; Vitesse conservative pour fiabiliser l'ecriture via le CH343.
upload_speed = 115200

build_flags =
    -mfix-esp32-psram-cache-issue

; Live View minimal : ne compile pas les sous-systemes temporairement desactives.
build_src_filter =
    +<*>
    -<storage_manager.cpp>
    -<touch_manager.cpp>
    -<encoder_manager.cpp>
    -<glitch_engine.cpp>

; --- Port Linux actuel: driver cdc_acm pour la puce CH343 ---
; default_reset tente l'auto-reset. Si GPIO0 n'est pas relie a DTR/RTS,
; maintenir BOOT, presser RESET, puis relacher BOOT avant l'upload.
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
upload_flags =
    --before=default_reset
    --after=hard_reset
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
