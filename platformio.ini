[env:azoth_esp32_s3_n16r8]
platform = espressif32
board = azoth_esp32_s3_n16r8
framework = arduino
monitor_speed = 115200
; Vitesse conservative pour fiabiliser l'ecriture via le CH343.
upload_speed = 115200

build_flags =
    -mfix-esp32-psram-cache-issue

; Live View minimal : ne compile pas les sous-systemes temporairement desactives.
build_src_filter =
    +<*>
    -<storage_manager.cpp>
    -<touch_manager.cpp>
    -<encoder_manager.cpp>
    -<glitch_engine.cpp>

; Laisser PlatformIO detecter le CH343. Ne pas utiliser --before=no_reset :
; esptool doit piloter DTR/RTS pour placer automatiquement le S3 en bootloader.
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
