[env:azoth_esp32_s3_n16r8]
platform = espressif32
board = azoth_esp32_s3_n16r8
framework = arduino
monitor_speed = 115200

build_flags =
    -mfix-esp32-psram-cache-issue

; --- Forcer le port incrémenté par le système ---
upload_port = /dev/ttyCH343USB0
monitor_port = /dev/ttyCH343USB10
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
